spring.application.name=journal-service

server.port = 8081



eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/journalDB?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.name=journalDB

spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate

# === DATABASE MIGRATIONS (FLYWAY) ===
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

# === CONNECTION POOLING (HIKARICP) ===
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# === REDIS CACHING ===
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=simple
spring.cache.redis.time-to-live=600000


# === LOGGING CONFIGURATION ===

# Log file path and name
logging.file.name=journal-service/Log/journalLog.log

# Minimum logging level
logging.level.root=INFO

# Optional: Show more verbose logs from your packages
logging.level.com.samir.journal_service=DEBUG

# Optional: Log format pattern (console and file)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ==============================
# ? DISTRIBUTED TRACING CONFIG
# ==============================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
