# ─── journal-service PRODUCTION profile ─────────────────────────────────────
# Activated by: --spring.profiles.active=prod  (set on your deployment server)

# Safe DDL — never auto-alter tables in production
spring.jpa.hibernate.ddl-auto=validate

# Read secrets from environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Quieter logging in prod
logging.level.root=WARN
logging.level.com.example.journal_service=INFO
