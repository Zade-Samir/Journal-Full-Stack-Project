spring.application.name=api-gateway

# Server Port
server.port=8080

# ==============================
# ? GATEWAY ROUTES
# ==============================

# Auth Service Route
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# Journal Service Route
spring.cloud.gateway.routes[1].id=journal-service
spring.cloud.gateway.routes[1].uri=lb://journal-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/journal/**

# Goals Route (routes to journal-service)
spring.cloud.gateway.routes[2].id=goals-route
spring.cloud.gateway.routes[2].uri=lb://journal-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/goals/**

# ==============================
# ? EUREKA CONFIG
# ==============================

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
jwt.secret=${JWT_SECRET:myLocalDevSecretKey_replaceInProd_32chars}

# ==============================
# CORS CONFIG — handled in Java CorsConfig.java
# ==============================

# === FRONTEND URL (override in prod via env var FRONTEND_URL) ===
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ==============================
# ? CIRCUIT BREAKER FILTERS
# ==============================
spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=journalServiceCB
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/journal

spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=goalsCB
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/fallback/journal

# ==============================
# ? RESILIENCE4J CONFIG
# ==============================
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s

# ==============================
# ? DISTRIBUTED TRACING CONFIG
# ==============================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}