spring.application.name=auth-service

server.port = 8082

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/JournalAuthDB?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.name=JournalAuthDB

spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate

# === DATABASE MIGRATIONS (FLYWAY) ===
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true

# === CONNECTION POOLING (HIKARICP) ===
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

jwt.secret=${JWT_SECRET:myLocalDevSecretKey_replaceInProd_32chars}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=email,profile

# === LOGGING CONFIGURATION ===

# Log file path and name
logging.file.name=auth-service/Logs/AuthLog.log

# Minimum logging level
logging.level.root=INFO

# Optional: Show more verbose logs from your packages
logging.level.com.samir.authservice=DEBUG

# Optional: Log format pattern (console and file)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# === FRONTEND URL (override in prod via env var FRONTEND_URL) ===
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# === RESEND EMAIL CONFIGURATION ===
resend.api.key=${RESEND_API_KEY:re_your_api_key}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# ==============================
# ? DISTRIBUTED TRACING CONFIG
# ==============================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}