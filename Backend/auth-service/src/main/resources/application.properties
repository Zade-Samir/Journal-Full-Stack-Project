spring.application.name=auth-service

server.port = 8082

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.datasource.url=jdbc:mysql://localhost:3306/JournalAuthDB?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.name=JournalAuthDB

spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update


jwt.secret=${JWT_SECRET:myLocalDevSecretKey_replaceInProd_32chars}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=email,profile

# === LOGGING CONFIGURATION ===

# Log file path and name
logging.file.name=auth-service/Logs/AuthLog.log

# Minimum logging level
logging.level.root=INFO

# Optional: Show more verbose logs from your packages
logging.level.com.samir.authservice=DEBUG

# Optional: Log format pattern (console and file)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# === FRONTEND URL (override in prod via env var FRONTEND_URL) ===
app.frontend.url=${FRONTEND_URL:http://localhost:5173}