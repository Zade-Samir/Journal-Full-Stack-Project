version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - journal-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build:
      context: ./Backend/eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - journal-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./Backend/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8082:8082"
    environment:
      - DB_URL=jdbc:mysql://mysql-db:3306/JournalAuthDB?createDatabaseIfNotExist=true&serverTimezone=UTC
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - EUREKA_URL=http://eureka-server:8761/eureka
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - journal-network

  journal-service:
    build:
      context: ./Backend/journal-service
      dockerfile: Dockerfile
    container_name: journal-service
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:mysql://mysql-db:3306/journalDB?createDatabaseIfNotExist=true&serverTimezone=UTC
      - DB_PASSWORD=${DB_PASSWORD}
      - EUREKA_URL=http://eureka-server:8761/eureka
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - journal-network

  api-gateway:
    build:
      context: ./Backend/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - EUREKA_URL=http://eureka-server:8761/eureka
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - journal-network

volumes:
  mysql-data:

networks:
  journal-network:
    driver: bridge
